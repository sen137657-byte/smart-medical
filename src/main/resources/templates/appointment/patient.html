<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>患者预约管理</title>

    <!-- Vue2 + Axios（CDN 引入，体现前后端分离） -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body { font-family: Arial, Helvetica, sans-serif; }
        .row { margin: 10px 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        table { border-collapse: collapse; width: 920px; max-width: 100%; }
        th, td { border: 1px solid #333; padding: 6px 10px; text-align: left; }
        th { background: #f5f5f5; }

        .status-booked { color: #1a7f37; font-weight: bold; }
        .status-cancel { color: #666; font-weight: bold; }
        .status-finish { color: #1f6feb; font-weight: bold; }

        .btn { padding: 4px 10px; cursor: pointer; }
        .btn-danger { border: 1px solid #c33; background: #fff; color: #c33; }
        .btn-normal { border: 1px solid #666; background: #fff; color: #333; }
        .btn-disabled { border: 1px solid #ccc; background: #f7f7f7; color: #999; cursor: not-allowed; }

        .hint { color: #666; font-size: 12px; }
        .badge { font-size: 12px; color: #333; }
        .slot-hint { color: #666; font-size: 12px; margin-left: 6px; }
    </style>
</head>
<body>

<h2>患者预约管理</h2>

<div id="app">

    <h3>创建预约</h3>

    <div class="row">
        医生：
        <select v-model="doctorId">
            <option value="">-- 请选择医生 --</option>
            <option v-for="d in doctors" :key="d.id" :value="d.id">
                {{ d.name }}（ID: {{ d.id }}）
            </option>
        </select>

        日期：
        <input v-model="workDate" type="date">

        可预约时间段：
        <select v-model="selectedSlot" :disabled="!doctorId || !workDate || slots.length===0">
            <option value="">-- 请选择时间段 --</option>
            <option v-for="s in slots" :key="s" :value="s">{{ s }}</option>
        </select>

        <button class="btn btn-normal" @click="createAppointment">预约</button>

        <span class="hint">
            提示：预约时间必须来自医生排班；只有“已预约”状态才可取消。
        </span>
        <span class="slot-hint" v-if="doctorId && workDate && slots.length===0">
            （当天无可预约时间段/已约满/停诊）
        </span>
    </div>

    <hr>

    <div class="row">
        <h3 style="display:inline-block;margin:0;">我的预约列表</h3>

        <button class="btn btn-normal" @click="refresh">刷新</button>

        筛选：
        <select v-model="filterStatus" @change="onFilterChange">
            <option value="ALL">全部</option>
            <option value="BOOKED">仅已预约</option>
            <option value="CANCELLED">已取消</option>
            <option value="FINISHED">已完成</option>
        </select>

        每页：
        <select v-model.number="pageSize" @change="changePageSize">
            <option :value="2">2</option>
            <option :value="5">5</option>
            <option :value="10">10</option>
        </select>

        <span class="badge">
            总数：{{ total }}，当前页：{{ current }} / {{ pages }}
        </span>
    </div>

    <div class="row">
        <button
                class="btn"
                :class="current<=1 ? 'btn-disabled' : 'btn-normal'"
                :disabled="current<=1"
                @click="goPrev">
            上一页
        </button>

        <button
                class="btn"
                :class="current>=pages ? 'btn-disabled' : 'btn-normal'"
                :disabled="current>=pages"
                @click="goNext">
            下一页
        </button>
    </div>

    <table>
        <tr>
            <th>ID</th>
            <th>医生</th>
            <th>预约时间</th>
            <th>状态</th>
            <th>操作</th>
        </tr>

        <tr v-for="item in list" :key="item.id">
            <td>{{ item.id }}</td>
            <td>{{ getDoctorName(item.doctorId) }}</td>
            <td>{{ formatTime(item.appointmentTime) }}</td>
            <td>
                <span :class="statusClass(item.status)">
                    {{ statusText(item.status) }}
                </span>
            </td>
            <td>
                <button
                        v-if="item.status==='BOOKED'"
                        class="btn btn-danger"
                        @click="cancel(item.id)">
                    取消
                </button>
                <span v-else>-</span>
            </td>
        </tr>
    </table>

</div>

<script>
    // ✅ 1）必须放在最前面：全局打印 axios 错误（抓 500/401/404 的真实返回）
    axios.interceptors.response.use(
        res => res,
        err => {
            console.error("❌ Axios Error:", {
                url: err.config && err.config.url,
                method: err.config && err.config.method,
                params: err.config && err.config.params,
                data: err.config && err.config.data,
                status: err.response && err.response.status,
                response: err.response && err.response.data
            });
            return Promise.reject(err);
        }
    );

    // ✅ 2）日期格式兼容：把 2026/02/26 统一转成 2026-02-26
    function normalizeDateStr(dateStr) {
        if (!dateStr) return '';
        return String(dateStr).replaceAll('/', '-');
    }

    new Vue({
        el: '#app',
        data: {
            doctorId: '',
            doctors: [],

            workDate: '',
            slots: [],
            selectedSlot: '',

            list: [],
            total: 0,
            current: 1,
            pages: 1,
            pageSize: 5,

            filterStatus: 'ALL'
        },
        mounted() {
            this.loadDoctors();
            this.loadPage(1);
            this.workDate = this.todayDateStr(); // 默认今天
        },
        watch: {
            doctorId() { this.loadSlots(); },
            workDate() { this.loadSlots(); }
        },
        methods: {
            todayDateStr() {
                const d = new Date();
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${day}`;
            },

            loadDoctors() {
                axios.get('/api/doctor/options')
                    .then(res => {
                        if (res.data.success) {
                            this.doctors = res.data.data || [];
                        } else {
                            alert(res.data.message);
                        }
                    })
                    .catch(() => {
                        alert("加载医生列表失败：请确认后端 /api/doctor/options 可访问");
                    });
            },

            getDoctorName(doctorId) {
                const d = this.doctors.find(x => x.id == doctorId);
                return d ? d.name : ('医生ID:' + doctorId);
            },

            // ✅ 加载 slots：对 date 做 normalize
            loadSlots() {
                this.slots = [];
                this.selectedSlot = '';

                if (!this.doctorId || !this.workDate) return;

                const dateStr = normalizeDateStr(this.workDate);

                axios.get('/api/schedule/slots', {
                    params: {
                        doctorId: this.doctorId,
                        date: dateStr
                    }
                }).then(res => {
                    if (res.data.success) {
                        this.slots = res.data.data || [];
                    } else {
                        alert(res.data.message);
                    }
                }).catch(() => {
                    alert("加载可预约时间段失败：请确认后端 /api/schedule/slots 可访问（查看控制台 Axios Error）");
                });
            },

            loadPage(page) {
                axios.get('/api/appointment/patient/page', {
                    params: {
                        page: page,
                        size: this.pageSize,
                        status: this.filterStatus
                    }
                }).then(res => {
                    if (res.data.success) {
                        const p = res.data.data;
                        this.list = p.records || [];
                        this.total = p.total || 0;
                        this.current = p.current || 1;
                        this.pages = p.pages || 1;
                    } else {
                        alert(res.data.message);
                    }
                });
            },

            refresh() { this.loadPage(this.current); },
            onFilterChange() { this.loadPage(1); },
            changePageSize() { this.loadPage(1); },
            goPrev() { if (this.current > 1) this.loadPage(this.current - 1); },
            goNext() { if (this.current < this.pages) this.loadPage(this.current + 1); },

            // 创建预约：date + slotStart => appointmentTime（ISO）
            createAppointment() {
                if (!this.doctorId) return alert("请选择医生");
                if (!this.workDate) return alert("请选择日期");
                if (!this.selectedSlot) return alert("请选择可预约时间段");

                const start = this.selectedSlot.split('-')[0]; // "09:00"
                const dateStr = normalizeDateStr(this.workDate);
                const appointmentTime = `${dateStr}T${start}:00`;

                axios.post('/api/appointment', {
                    doctorId: this.doctorId,
                    appointmentTime: appointmentTime
                }).then(res => {
                    if (res.data.success) {
                        alert("预约成功");
                        this.filterStatus = 'BOOKED';
                        this.loadPage(1);
                        this.loadSlots(); // ✅ 刷新 slots（过滤掉已预约）
                    } else {
                        alert(res.data.message);
                        this.loadSlots(); // ✅ 失败也刷新，避免不一致
                    }
                }).catch(() => {
                    alert("预约失败：查看控制台 Axios Error");
                    this.loadSlots();
                });
            },

            cancel(id) {
                axios.put('/api/appointment/' + id + '/cancel')
                    .then(res => {
                        if (res.data.success) {
                            alert("取消成功");
                            this.refresh();
                            this.loadSlots(); // ✅ 取消后 slot 可能重新开放
                        } else {
                            alert(res.data.message);
                        }
                    })
                    .catch(() => {
                        alert("取消失败：查看控制台 Axios Error");
                    });
            },

            formatTime(timeStr) {
                if (!timeStr) return '';
                return timeStr.replace('T', ' ').substring(0, 16);
            },

            statusText(status) {
                if (status === 'BOOKED') return '已预约';
                if (status === 'CANCELLED') return '已取消';
                if (status === 'FINISHED') return '已完成';
                return status || '';
            },

            statusClass(status) {
                if (status === 'BOOKED') return 'status-booked';
                if (status === 'CANCELLED') return 'status-cancel';
                if (status === 'FINISHED') return 'status-finish';
                return '';
            }
        }
    });
</script>

</body>
</html>
